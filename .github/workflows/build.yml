name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unix:
    runs-on: ${{ matrix.os }}
    name: "${{ matrix.name }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            preset: clang-release
            build_dir: build/clang-release
          - name: macOS ARM64
            os: macos-14
            preset: clang-release
            build_dir: build/clang-release

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history + tags so the version is derived correctly

    - name: Install clang (Linux)
      if: runner.os == 'Linux'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21

    - name: Install Homebrew dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install llvm ninja
        echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ccache-${{ matrix.os }}
        max-size: 256M

    - name: Install CMake
      uses: ssrobins/install-cmake@v1

    - name: Install Ninja (Linux)
      if: runner.os == 'Linux'
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Get vendored libraries (crispy)
      run: python3 scripts/get_contour_dirs.py

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: cmake --preset ${{ matrix.preset }} -DCMAKE_C_COMPILER=clang-21 -DCMAKE_CXX_COMPILER=clang++-21

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: cmake --preset ${{ matrix.preset }}

    - name: Build
      run: cmake --build ${{ matrix.build_dir }}

    - name: Test
      working-directory: ${{ matrix.build_dir }}
      run: ctest --output-on-failure
      timeout-minutes: 5

  windows:
    runs-on: windows-latest
    name: "Windows clang-cl"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install CMake
      uses: ssrobins/install-cmake@v1

    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Get vendored libraries (crispy)
      run: python scripts/get_contour_dirs.py

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake --preset clangcl-release

    - name: Build
      run: cmake --build build/clangcl-release --config Release

    - name: Test
      working-directory: build/clangcl-release
      run: ctest --output-on-failure --build-config Release
      timeout-minutes: 5
